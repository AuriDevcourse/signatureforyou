<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Signature Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: 'var(--brand)',
                        ink: 'var(--ink)',
                        surface: 'var(--surface)',
                        muted: 'var(--muted)',
                        line: 'var(--line)',
                    },
                    fontFamily: {
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col relative overflow-x-hidden overflow-y-auto font-body" style="background: var(--page-bg); color: var(--ink);">
    <div class="container mx-auto p-6 sm:p-8 relative z-10 max-w-6xl">
        <header class="mb-8 text-center">
            <h1 class="text-3xl sm:text-4xl font-semibold tracking-tight">Email Signature Generator</h1>
            <p class="text-sm sm:text-base mt-2" style="color: var(--muted);">A clean, free signature for any organization.</p>
        </header>

        <div class="card p-4 sm:p-5 mb-8 flex flex-col sm:flex-row sm:items-center sm:justify-center gap-4 sm:gap-8">
            <div class="flex items-center gap-3">
                <label for="brand-color" class="form-label-sm !mb-0 whitespace-nowrap">Brand Color</label>
                <input type="color" id="brand-color" value="#6FA88A" class="h-9 w-12 rounded-md border cursor-pointer" style="border-color: var(--line);">
                <input type="text" id="brand-color-hex" value="#6FA88A" class="form-input form-input-sm w-24 font-mono" maxlength="7">
            </div>
            <div class="flex items-center gap-3">
                <label class="form-label-sm !mb-0 whitespace-nowrap">Background</label>
                <div class="flex gap-2 flex-wrap" id="bg-swatches">
                    <button type="button" class="bg-swatch" data-bg="#E8F2EB" style="background:#E8F2EB" title="Mint"></button>
                    <button type="button" class="bg-swatch" data-bg="#EAF0F6" style="background:#EAF0F6" title="Sky"></button>
                    <button type="button" class="bg-swatch" data-bg="#F4ECE2" style="background:#F4ECE2" title="Sand"></button>
                    <button type="button" class="bg-swatch" data-bg="#F2E8EE" style="background:#F2E8EE" title="Blush"></button>
                    <button type="button" class="bg-swatch" data-bg="#EDEAF4" style="background:#EDEAF4" title="Lavender"></button>
                    <button type="button" class="bg-swatch" data-bg="#F5F5F5" style="background:#F5F5F5" title="Neutral"></button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 lg:gap-8">
            <div class="lg:col-span-1 card p-5 max-h-[calc(100vh-14rem)] overflow-y-auto">
                <h2 class="text-base font-semibold mb-3">Your Details</h2>
                <form id="signature-form" class="space-y-2.5">
                    <div>
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" id="name" class="form-input" placeholder="Jane Doe">
                    </div>
                    <div>
                        <label for="job-title" class="form-label">Job Title</label>
                        <input type="text" id="job-title" class="form-input" placeholder="Marketing Manager">
                    </div>
                    <div>
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" class="form-input" placeholder="yourname@gmail.com">
                    </div>
                    <div>
                        <label for="phone" class="form-label">Phone</label>
                        <input type="tel" id="phone" class="form-input" placeholder="+1 555 123 4567">
                    </div>
                    <div>
                        <label for="personal-linkedin" class="form-label">Personal LinkedIn</label>
                        <input type="url" id="personal-linkedin" class="form-input" placeholder="https://www.linkedin.com/in/yourname">
                    </div>
                    <div>
                        <label class="form-label">Profile Photo</label>
                        <input type="file" id="photo-upload" class="hidden" accept="image/*">
                        <button type="button" id="upload-btn" class="upload-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            <span>Upload Image</span>
                        </button>
                        <input type="hidden" id="photo" value="">
                    </div>
                    <div>
                        <div class="flex items-center justify-between mb-1">
                            <label for="message" class="form-label !mb-0">Optional Message</label>
                            <button type="button" id="add-link-btn" class="text-xs font-medium hover:opacity-70 transition flex items-center gap-1" style="color: var(--brand);" title="Add a hyperlink to your message.">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                                Add Link
                            </button>
                        </div>
                        <textarea id="message" rows="3" class="form-input" placeholder="A short message..."></textarea>
                    </div>

                    <details class="group">
                        <summary class="cursor-pointer list-none">
                            <div class="form-collapsible">
                                <span class="text-sm font-medium">Company Info</span>
                                <svg class="w-5 h-5 transition-transform group-open:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                                </svg>
                            </div>
                        </summary>
                        <div class="mt-3 space-y-3 pl-1">
                            <div>
                                <label for="company" class="form-label-sm">Company Name</label>
                                <input type="text" id="company" class="form-input form-input-sm" placeholder="Acme Inc.">
                            </div>
                            <div>
                                <label for="address" class="form-label-sm">Address</label>
                                <input type="text" id="address" class="form-input form-input-sm" placeholder="123 Main St, City, Country">
                            </div>
                            <div>
                                <label for="website" class="form-label-sm">Website</label>
                                <input type="url" id="website" class="form-input form-input-sm" placeholder="https://example.com">
                            </div>
                            <div>
                                <label for="linkedin" class="form-label-sm">LinkedIn (Company)</label>
                                <input type="url" id="linkedin" class="form-input form-input-sm" placeholder="https://www.linkedin.com/company/your-org">
                            </div>
                            <div>
                                <label for="facebook" class="form-label-sm">Facebook</label>
                                <input type="url" id="facebook" class="form-input form-input-sm" placeholder="https://www.facebook.com/your-org">
                            </div>
                            <div>
                                <label for="instagram" class="form-label-sm">Instagram</label>
                                <input type="url" id="instagram" class="form-input form-input-sm" placeholder="https://www.instagram.com/your-org">
                            </div>
                        </div>
                    </details>

                </form>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="hidden sm:block">
                    <h3 class="text-base font-semibold mb-3">Desktop Preview</h3>
                    <div class="card p-6 min-h-[220px]">
                        <div id="desktop-preview"></div>
                    </div>
                </div>
                <div>
                    <h3 class="text-base font-semibold mb-3">Mobile Preview</h3>
                    <div class="card-dark p-6 min-h-[220px] flex justify-start items-start">
                        <div id="mobile-preview-wrapper" class="w-[360px] overflow-hidden">
                            <div id="mobile-preview"></div>
                        </div>
                    </div>
                </div>
                <div class="flex gap-3 flex-wrap">
                    <button type="button" id="copy-btn" class="btn btn-primary hidden">Copy Signature</button>
                    <button type="button" id="how-to-btn" class="btn btn-ghost">How to Add to Gmail</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Gmail Setup Modal -->
    <div id="gmail-modal" class="fixed inset-0 bg-black/50 z-50 flex justify-center items-center hidden p-4">
        <div class="card p-6 sm:p-8 max-w-xl w-full relative">
            <button type="button" id="gmail-close" class="absolute top-3 right-3 hover:opacity-60 transition" style="color: var(--muted);">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <h2 class="text-xl font-semibold mb-5">Add Your Signature to Gmail</h2>
            <div id="gmail-step" class="space-y-3"></div>
            <div class="flex justify-between items-center mt-6">
                <button type="button" id="gmail-prev" class="text-sm hover:opacity-70 transition hidden" style="color: var(--muted);">← Previous</button>
                <div class="flex gap-2" id="gmail-dots"></div>
                <button type="button" id="gmail-next" class="btn btn-primary !h-9 !px-4 !text-sm">Next</button>
            </div>
        </div>
    </div>

    <div id="crop-modal" class="hidden fixed inset-0 bg-black/60 z-50 overflow-y-scroll" style="touch-action: pan-y; -webkit-overflow-scrolling: touch;">
        <div class="min-h-screen flex items-center justify-center p-4 py-8">
            <div class="card p-5 sm:p-6 max-w-lg w-full">
                <h3 class="text-base sm:text-lg font-semibold mb-3 sm:mb-4">Crop Your Image</h3>
                <div class="w-full h-[35vh] sm:h-[45vh] md:h-[50vh] flex items-center justify-center overflow-hidden rounded-lg" style="background:#f5f5f5;">
                    <img id="crop-image" src="" alt="Image to crop" class="max-w-full max-h-full">
                </div>
                <div class="space-y-3 mt-4">
                    <div>
                        <label for="brightness" class="form-label-sm">Brightness</label>
                        <input type="range" id="brightness" min="0" max="200" value="100" class="w-full">
                    </div>
                    <div>
                        <label for="saturation" class="form-label-sm">Saturation</label>
                        <input type="range" id="saturation" min="0" max="200" value="100" class="w-full">
                    </div>
                </div>
                <div class="flex flex-col sm:flex-row justify-end gap-3 mt-5">
                    <button type="button" id="cancel-crop-btn" class="btn btn-ghost w-full sm:w-auto">Cancel</button>
                    <button type="button" id="crop-and-upload-btn" class="btn btn-primary w-full sm:w-auto">Crop & Upload</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
    <script src="script.js"></script>

    <!-- Vercel Web Analytics (active once deployed on Vercel; 404s harmlessly on localhost) -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
